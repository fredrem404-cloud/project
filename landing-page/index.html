<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="자연이 빚은 루비의 빛깔, 달콤함의 정점 루비 키위를 만나보세요.">
    <title>Ruby Kiwi - 달콤한 루비의 유혹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#" class="logo">Ruby<span>Kiwi</span></a>
        <nav>
            <ul>
                <li><a href="#home">홈페이지</a></li>
                <li><a href="#story">제품 스토리</a></li>
                <li><a href="#contact">문의하기</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" id="home">
            <div class="circle-blur circle-1"></div>
            <div class="circle-blur circle-2"></div>
            
            <div class="hero-content">
                <span class="hero-badge">Premium Selection</span>
                <h1>자연이 빚은<br><span>루비의 빛깔</span></h1>
                <p>일반 키위보다 3배 더 달콤하고, 항산화 성분이 풍부한 루비 키위. 지금껏 경험하지 못한 새로운 달콤함을 선사합니다.</p>
                <div class="cta-group">
                    <a href="#story" class="btn btn-primary">더 알아보기</a>
                    <a href="#contact" class="btn btn-secondary">구매 문의</a>
                </div>
            </div>

            <div class="hero-image">
                <img src="ruby_kiwi.png" alt="Ruby Kiwi - Vibrant red center slice">
            </div>
        </section>
    </main>

    <script>
        // Smooth scrolling for navigation links
        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Add scrolled class to header on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.padding = '1rem 10%';
                header.style.background = 'rgba(5, 5, 5, 0.95)';
            } else {
                header.style.padding = '1.5rem 10%';
                header.style.background = 'rgba(5, 5, 5, 0.8)';
            }
        });
    </script>
</body>
</html>
